<!DOCTYPE html>
<html>
	<head>
		<title>Question 3</title>
		<meta name="author" content="CD23061 Nursyuhada">
	
		<style>
			table{
				width:80%;
				margin:auto;
				border: 1px solid black;
			}
		
			h1{
				text-align:center;
			}
		
			td{
				padding:6px;
			}
		
			td:first-child{
				width:250px;
				font-weight:bold;
				white-space: nowrap;
			}
		</style>
	</head>
	
	<body>
		<form>
			<table cellpadding= "5">
		
			<tr>
				<td colspan ="2">
				<h1> Your Personal Details </h1> 
				</td>
			</tr>
			
			<tr>
				<td><b>Your name: </b></td>
				<td><input type="text" name="firstname" size="80"></td>
			</tr>
			
			<tr>
				<td><b>Student number: </b></td>
				<td><input type="text" name="lastname" size="40"></td>
			</tr>
			
			<tr>
				<td><b>Program: </b></td>
				<td>
					<select>
						<option>Bachelor of Computer Science (Software Engineering) with Honours</option>
						<option>Bachelor of Computer Science (Cyber Security) with Honours</option>
						<option>Bachelor of Computer Science (Computer Systems & Networking) with Honours</option>
						<option>Bachelor of Computer Science (Graphic & Multimedia Technology) with Honours</option>
					</select>
				</td>
			</tr>
			
			<tr>
				<td><b>Gender:</b></td>
				<td>
					<input type="radio" name="gender"> Male
					<input type="radio" name="gender"> Female
				</td>
			</tr>

			<tr>
				<td><b>Hobby:</b></td>
				<td>
					<input type="checkbox"> Reading
					<input type="checkbox"> Outdoor Activities
					<input type="checkbox"> Watching TV
					<input type="checkbox"> Sleeping
				</td>
			</tr>
			
			<tr>
				<td><b>Comments:</b></td>
				<td>
					<textarea rows="3" cols="30"></textarea>
				</td>
			</tr>

			<tr>
				<td></td>
				<td>
					<input type="submit" value="Submit">
					<input type="reset" value="Reset">
				</td>
			</tr>
			
			</table>
		</form>
		
	</body>
</html>
